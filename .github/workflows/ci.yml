name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy
      - run: cargo clippy -- -D warnings
      - run: cargo build --release
      # Unit tests run on the host target: .cargo/config.toml pins the build to
      # wasm32-wasip1, which can't execute a test binary natively.
      - run: cargo test --target x86_64-unknown-linux-gnu
